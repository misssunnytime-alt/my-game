<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Office Energy Match｜打工人能量管理消消乐</title>
<style>
*{box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;width:100%;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:#3b2a2a;background:linear-gradient(145deg,#ffe8d0,#f6ad9f);overflow-x:hidden}
.app{width:min(430px,100vw);margin:0 auto;padding:max(8px,env(safe-area-inset-top)) 10px max(8px,env(safe-area-inset-bottom))}
.top{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-bottom:6px}
.title h1{margin:0;font-size:20px;line-height:1.05;font-weight:1000}
.title p{margin:4px 0 0;font-size:12px;color:#7b6464}
.btns{display:flex;gap:6px}
button{border:0;border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.86);font-weight:900;color:#3b2a2a;box-shadow:0 6px 14px rgba(80,45,45,.14)}
.hud{display:grid;grid-template-columns:1fr .72fr .64fr;gap:7px;margin-bottom:7px}
.panel{background:rgba(255,255,255,.76);border:1px solid rgba(255,255,255,.78);border-radius:16px;padding:8px;box-shadow:0 8px 20px rgba(83,45,45,.13);backdrop-filter:blur(6px)}
.stat-label{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#7a6262;margin-bottom:5px}
.stat-label b{font-size:15px;color:#6a4e4e}
.bar{height:14px;border-radius:999px;background:rgba(80,45,45,.12);overflow:hidden}
.fill{height:100%;border-radius:999px;transition:width .22s ease}
.energy-fill{background:linear-gradient(90deg,#1fc96b,#f6d943,#ff7a46,#ff4a57)}
.idle-fill{background:linear-gradient(90deg,#7cc8ff,#8e63ff,#ff4d4f)}
.time-num{font-size:28px;font-weight:1000;line-height:1}
.time-label{font-size:11px;color:#7a6262;margin-top:2px}
.task{margin-bottom:7px}
.task-head{display:flex;justify-content:space-between;font-size:13px;color:#7a6262;margin-bottom:8px}
.task-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.task-item{background:rgba(255,255,255,.58);border-radius:13px;padding:8px 6px;text-align:center;font-size:15px;font-weight:1000;white-space:nowrap}
.bossbar{height:50px;margin:0 0 7px;background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.8);border-radius:16px;box-shadow:0 8px 20px rgba(83,45,45,.13);overflow:hidden}
.boss{height:100%;display:grid;grid-template-columns:42px 1fr;gap:8px;align-items:center;padding:6px 12px;background:linear-gradient(145deg,#efefef,#fff);color:#8a7474;transition:all .2s ease}
.boss.active{background:linear-gradient(145deg,#9c1e2e,#ff445b);color:#fff;animation:bossPulse .65s infinite alternate}
@keyframes bossPulse{from{filter:brightness(1)}to{filter:brightness(1.12)}}
.boss-face{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.72);font-size:22px}
.boss-main{font-weight:1000;font-size:14px;line-height:1.1}
.boss-sub{font-size:11px;opacity:.84;margin-top:3px}
.board{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;padding:6px;border-radius:18px;background:rgba(255,255,255,.56);box-shadow:inset 0 0 0 1px rgba(255,255,255,.5),0 10px 24px rgba(83,45,45,.14);margin:0 0 7px}
.tile{aspect-ratio:1/1;width:100%;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,6vw,29px);box-shadow:0 5px 10px rgba(83,45,45,.12);position:relative;overflow:hidden}
.tile.food{background:linear-gradient(145deg,#fff8c8,#fff1a6)}
.tile.work{background:linear-gradient(145deg,#eaf0ff,#d8e0f8)}
.tile.meat{background:linear-gradient(145deg,#ffe2d0,#ffb48f);animation:meatPulse .55s infinite alternate}
@keyframes meatPulse{from{transform:scale(1)}to{transform:scale(1.04)}}
.tile.meat:before{content:attr(data-life);position:absolute;top:2px;right:3px;background:#ff4057;color:#fff;border-radius:999px;font-size:10px;padding:1px 5px;font-weight:1000}
.tile.locked{filter:grayscale(1);opacity:.43;box-shadow:inset 0 0 0 2px rgba(80,80,80,.2)}
.tile.locked:after{content:"🔒";position:absolute;top:1px;right:3px;font-size:14px}
.slotbox{background:rgba(255,255,255,.72);border-radius:16px;padding:7px;box-shadow:0 8px 20px rgba(83,45,45,.13)}
.slot-head{display:flex;justify-content:space-between;font-size:12px;color:#7a6262;margin:0 2px 6px}
.slots{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.slot{height:38px;border-radius:12px;background:rgba(80,45,45,.08);border:1px dashed rgba(80,45,45,.16);display:flex;align-items:center;justify-content:center;font-size:23px}
.slot.filled{background:rgba(255,255,255,.92);border:none;box-shadow:0 4px 9px rgba(83,45,45,.11)}
.footer{font-size:11px;text-align:center;color:#7a6262;margin-top:6px}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:rgba(59,42,42,.9);color:#fff;border-radius:999px;padding:9px 14px;font-size:13px;font-weight:900;opacity:0;pointer-events:none;transition:.2s;z-index:20;white-space:nowrap}
.toast.show{opacity:1;bottom:110px}
.float{position:fixed;left:50%;bottom:132px;transform:translateX(-50%);font-size:21px;font-weight:1000;pointer-events:none;z-index:30;animation:fly 1.65s ease forwards;text-shadow:0 2px 8px rgba(255,255,255,.9)}
@keyframes fly{0%{opacity:0;transform:translate(-50%,0) scale(.9)}12%{opacity:1}72%{opacity:1}100%{opacity:0;transform:translate(-50%,-64px) scale(1.1)}}
.overlay{position:fixed;inset:0;background:rgba(50,31,31,.72);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
.overlay.show{display:flex}
.modal{max-width:360px;width:100%;background:rgba(255,255,255,.94);border-radius:24px;padding:22px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal h2{margin:0 0 8px;font-size:26px}
.modal p{color:#7a6262;line-height:1.6}
.modal .big{font-size:38px;font-weight:1000;margin:10px 0}
@media (max-height:760px){
  .title h1{font-size:18px}.title p{font-size:11px}
  .panel{padding:7px}.task-item{font-size:14px;padding:7px 4px}
  .bossbar{height:46px}.slot{height:34px}
  .board{gap:4px;padding:5px}
}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="title">
      <h1>🎮 打工人能量管理消消乐</h1>
      <p>最后三分钟：补能量，清任务，然后下班。</p>
    </div>
    <div class="btns">
      <button id="pauseBtn">暂停</button>
      <button id="restartBtn">重开</button>
    </div>
  </div>

  <div class="hud">
    <div class="panel">
      <div class="stat-label"><span>能量</span><b id="energyText">60/100</b></div>
      <div class="bar"><div class="fill energy-fill" id="energyFill" style="width:60%"></div></div>
    </div>
    <div class="panel">
      <div class="stat-label"><span>摸鱼值</span><b id="idleText">0/3</b></div>
      <div class="bar"><div class="fill idle-fill" id="idleFill" style="width:0%"></div></div>
    </div>
    <div class="panel">
      <div class="time-num" id="timeText">180</div>
      <div class="time-label">剩余秒</div>
    </div>
  </div>

  <div class="panel task">
    <div class="task-head"><span>今日下班任务</span><b id="taskTotal">0/8</b></div>
    <div class="task-grid">
      <div class="task-item" id="taskEmail">📧 邮件 0/4</div>
      <div class="task-item" id="taskPpt">📊 PPT 0/2</div>
      <div class="task-item" id="taskMeet">👨‍💻 会议 0/2</div>
    </div>
  </div>

  <div class="bossbar">
    <div class="boss" id="bossBox">
      <div class="boss-face">👔</div>
      <div>
        <div class="boss-main" id="bossMain">老板工作中</div>
        <div class="boss-sub" id="bossSub">摸鱼值满格后触发</div>
      </div>
    </div>
  </div>

  <div class="board" id="board"></div>

  <div class="slotbox">
    <div class="slot-head"><span>临时槽位：5格，3个相同自动消除</span><span id="slotCount">0/5</span></div>
    <div class="slots" id="slots"></div>
  </div>
  <div class="footer">目标：5格槽位里抢肉、苟命、清任务，3分钟内下班。</div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay show" id="startOverlay">
  <div class="modal">
    <h2>打工开始 🧃</h2>
    <p>点击格子进入槽位，3个相同自动消除。</p>
    <p>素食回血少；肉食随机掉落，只存在3秒，同类三消大回血。</p>
    <p>摸鱼值到3老板来，食物会被锁一半。</p>
    <button id="startBtn" style="width:100%;padding:14px;background:#3b2a2a;color:#fff;margin-top:8px">开始上班</button>
  </div>
</div>

<div class="overlay" id="endOverlay">
  <div class="modal">
    <h2 id="endTitle">结算</h2>
    <p id="endDesc"></p>
    <div class="big" id="endBig"></div>
    <p id="endStats"></p>
    <button id="againBtn" style="width:100%;padding:14px;background:#3b2a2a;color:#fff;margin-top:8px">再打一局</button>
  </div>
</div>

<script>
(() => {
  const ROWS=5, COLS=8, TOTAL=ROWS*COLS;
  const SLOT_MAX=5, MAX_ENERGY=100, FAIL_ENERGY=20, START_ENERGY=60, GAME_TIME=180;
  const IDLE_LIMIT=3, BOSS_MIN_STAY=5;

  const ITEMS=[
    {id:"apple",emoji:"🍎",kind:"food",energy:3,weight:18},
    {id:"veg",emoji:"🥬",kind:"food",energy:3,weight:22},
    {id:"carrot",emoji:"🥕",kind:"food",energy:3,weight:16},
    {id:"mail",emoji:"📧",kind:"work",energy:-2,weight:18},
    {id:"ppt",emoji:"📊",kind:"work",energy:-10,weight:5},
    {id:"meeting",emoji:"👨‍💻",kind:"work",energy:-6,weight:8}
  ];
  const MEATS=[
    {id:"chicken",emoji:"🍗",kind:"meat",energy:8},
    {id:"fish",emoji:"🐟",kind:"meat",energy:8},
    {id:"steak",emoji:"🥩",kind:"meat",energy:8}
  ];

  let board=[], slots=[], energy=START_ENERGY, idle=0, timeLeft=GAME_TIME;
  let paused=true, ended=false, timer=null;
  let boss=false, bossSeconds=0, bossCooldown=0;
  let task={email:0,ppt:0,meeting:0}, target={email:4,ppt:2,meeting:2};
  let meatDropIn=7, foodEnergy=0, workCost=0, completedFood=0, completedWork=0, bossCount=0;

  const $=id=>document.getElementById(id);

  function uid(){return Math.random().toString(36).slice(2)}
  function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
  function pickWeighted(){
    const sum=ITEMS.reduce((a,b)=>a+b.weight,0);
    let r=Math.random()*sum;
    for(const it of ITEMS){r-=it.weight;if(r<=0)return {...it,locked:false,uid:uid()}}
    return {...ITEMS[0],locked:false,uid:uid()}
  }
  function pickMeat(){
    const it=MEATS[randInt(0,MEATS.length-1)];
    return {...it,locked:false,life:3,uid:uid()}
  }
  function init(){
    board=Array.from({length:TOTAL},pickWeighted);
    slots=[];energy=START_ENERGY;idle=0;timeLeft=GAME_TIME;paused=true;ended=false;
    boss=false;bossSeconds=0;bossCooldown=0;task={email:0,ppt:0,meeting:0};
    meatDropIn=7;foodEnergy=0;workCost=0;completedFood=0;completedWork=0;bossCount=0;
    $("startOverlay").classList.add("show");$("endOverlay").classList.remove("show");
    updateBoss();render();
  }
  function start(){
    paused=false;$("startOverlay").classList.remove("show");
    clearInterval(timer);timer=setInterval(tick,1000);
    toast("开始上班！");
  }
  function tick(){
    if(paused||ended)return;
    tickMeat();

    let decay=0.5;
    if(timeLeft<=60)decay*=1.3;
    if(boss)decay*=1.35;
    if(energy<=40)decay*=1.25;
    energy-=decay;

    if(bossCooldown>0)bossCooldown--;
    if(boss){
      bossSeconds++;
      if(bossSeconds%3===0)lockFood();
      if(bossSeconds%10===0){changeEnergy(-5);floatText("被催了 -5","bad")}
      if(bossSeconds>=BOSS_MIN_STAY && idle<IDLE_LIMIT)clearBoss();
    }

    timeLeft--;
    if(timeLeft<=0)return end(false,"overtime");
    if(energy<=FAIL_ENERGY)return end(false,"energy");
    render();
  }
  function tickMeat(){
    board.forEach((it,i)=>{
      if(it.kind==="meat"){it.life--;if(it.life<=0)board[i]=pickWeighted()}
    });
    meatDropIn--;
    if(meatDropIn<=0){spawnMeat();meatDropIn=randInt(6,10)}
  }
  function spawnMeat(){
    const candidates=[];
    board.forEach((it,i)=>{if(it.kind==="food"&&!it.locked)candidates.push(i)});
    candidates.sort(()=>Math.random()-.5);
    const n=Math.min(randInt(3,5),candidates.length);
    for(let i=0;i<n;i++)board[candidates[i]]=pickMeat();
    toast("🥩 肉食掉落！3秒内抢同类！");
  }
  function clickTile(i){
    if(paused||ended)return;
    const it=board[i];
    if(!it)return;
    if(it.locked){toast("老板盯着呢，这个吃不了！");return}
    if(slots.length>=SLOT_MAX){
      const reason=foodEnergy>=workCost?"撑死了":"累死了";
      return end(false,reason);
    }
    slots.push(it);
    board[i]=pickWeighted();
    checkMatch();
    render();
  }
  function checkMatch(){
    const counts={};
    for(const it of slots)counts[it.id]=(counts[it.id]||0)+1;
    const id=Object.keys(counts).find(k=>counts[k]>=3);
    if(!id)return;
    const matched=[],remain=[];
    for(const it of slots){
      if(it.id===id && matched.length<3)matched.push(it); else remain.push(it);
    }
    slots=remain;
    complete(matched[0]);
  }
  function complete(it){
    if(it.kind==="food"){
      const gain=it.energy*3;changeEnergy(gain);foodEnergy+=gain;completedFood++;
      idle=Math.min(IDLE_LIMIT,idle+1);
      floatText("+"+gain+" 能量","good");setTimeout(()=>floatText("+1 摸鱼","bad"),120);
    }else if(it.kind==="meat"){
      const gain=it.energy*3;changeEnergy(gain);foodEnergy+=gain;completedFood++;
      idle=Math.min(IDLE_LIMIT,idle+1);
      floatText("+"+gain+" 能量 肉食爆发！","good");setTimeout(()=>floatText("+1 摸鱼","bad"),120);
    }else{
      let cost=Math.abs(it.energy*3);
      if(it.id==="ppt" && energy<40){toast("没力气做PPT，先吃点肉！");slots.push(it,it,it);return}
      changeEnergy(-cost);workCost+=cost;completedWork++;
      idle=Math.max(0,idle-(boss?1:2));
      updateTask(it);
      floatText("-"+cost+" 能量","work");setTimeout(()=>floatText(boss?"-1 摸鱼":"-2 摸鱼","good"),120);
      if(done())return end(true,"done");
    }
    if(!boss && bossCooldown<=0 && idle>=IDLE_LIMIT)triggerBoss();
    render();
  }
  function updateTask(it){
    if(it.id==="mail")task.email=Math.min(target.email,task.email+1);
    if(it.id==="ppt")task.ppt=Math.min(target.ppt,task.ppt+1);
    if(it.id==="meeting")task.meeting=Math.min(target.meeting,task.meeting+1);
  }
  function totalTask(){return task.email+task.ppt+task.meeting}
  function done(){return task.email>=target.email&&task.ppt>=target.ppt&&task.meeting>=target.meeting}
  function triggerBoss(){
    boss=true;bossSeconds=0;bossCount++;updateBoss();lockFood();toast("老板来了：食物锁一半！");
  }
  function clearBoss(){
    boss=false;bossSeconds=0;bossCooldown=8;
    board.forEach(it=>it.locked=false);
    updateBoss();toast("老板继续工作去了。");
  }
  function lockFood(){
    board.forEach(it=>it.locked=false);
    const foods=board.filter(it=>it.kind==="food");
    foods.sort(()=>Math.random()-.5);
    const n=Math.floor(foods.length*.5);
    for(let i=0;i<n;i++)foods[i].locked=true;
  }
  function updateBoss(){
    $("bossBox").classList.toggle("active",boss);
    $("bossMain").textContent=boss?"老板来了":"老板工作中";
    $("bossSub").textContent=boss?"食物锁一半，先降摸鱼值":"摸鱼值满格后触发";
  }
  function changeEnergy(x){energy+=x;if(energy>MAX_ENERGY)energy=MAX_ENERGY}
  function render(){
    $("energyText").textContent=Math.floor(energy)+"/100";
    $("energyFill").style.width=Math.max(0,Math.min(100,energy))+"%";
    $("idleText").textContent=idle+"/"+IDLE_LIMIT+(idle>=2&&!boss?" 快满了":"");
    $("idleFill").style.width=(idle/IDLE_LIMIT*100)+"%";
    $("timeText").textContent=timeLeft;
    $("taskTotal").textContent=totalTask()+"/8";
    $("taskEmail").textContent=`📧 邮件 ${task.email}/${target.email}`;
    $("taskPpt").textContent=`📊 PPT ${task.ppt}/${target.ppt}`;
    $("taskMeet").textContent=`👨‍💻 会议 ${task.meeting}/${target.meeting}`;
    $("slotCount").textContent=slots.length+"/"+SLOT_MAX;

    const b=$("board");b.innerHTML="";
    board.forEach((it,i)=>{
      const d=document.createElement("div");
      d.className=`tile ${it.kind==="work"?"work":it.kind==="meat"?"meat":"food"} ${it.locked?"locked":""}`;
      if(it.kind==="meat")d.setAttribute("data-life",it.life+"s");
      d.textContent=it.emoji;
      d.onclick=()=>clickTile(i);
      b.appendChild(d);
    });
    const s=$("slots");s.innerHTML="";
    for(let i=0;i<SLOT_MAX;i++){
      const d=document.createElement("div");
      d.className="slot"+(slots[i]?" filled":"");
      d.textContent=slots[i]?slots[i].emoji:"";
      s.appendChild(d);
    }
  }
  function end(win,reason){
    ended=true;paused=true;clearInterval(timer);
    $("endOverlay").classList.add("show");
    $("endTitle").textContent=win?"活干完，下班！🎉":(reason==="overtime"?"下班失败：被迫加班 🫠":reason==="撑死了"?"撑死了 🤢":reason==="累死了"?"累死了 🫠":"能量崩溃了 🫠");
    $("endDesc").textContent=win?"你靠吃饭续命，把今日任务清掉了。":(reason==="overtime"?"3分钟到了，工作还没清完。老板：再改一版。":reason==="撑死了"?"你一直补能量，却忘了清任务。":reason==="累死了"?"你一直硬干活，身体跟不上了。":"不是你不努力，是今天的工作真的太密了。");
    $("endBig").textContent=win?"下班":"失败";
    $("endStats").textContent=`任务 ${totalTask()}/8｜食物 ${completedFood}组｜工作 ${completedWork}组｜老板出现 ${bossCount}次`;
  }
  let toastTimer=null;
  function toast(t){const el=$("toast");el.textContent=t;el.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("show"),1600)}
  function floatText(t,type){const el=document.createElement("div");el.className="float";el.textContent=t;el.style.color=type==="good"?"#25a85f":type==="bad"?"#ff4d4f":"#4d8dff";document.body.appendChild(el);setTimeout(()=>el.remove(),1750)}
  $("startBtn").onclick=start;
  $("againBtn").onclick=init;
  $("restartBtn").onclick=init;
  $("pauseBtn").onclick=()=>{if(ended)return;paused=!paused;$("pauseBtn").textContent=paused?"继续":"暂停";toast(paused?"已暂停":"继续上班")};
  init();
})();
</script>
</body>
</html>
